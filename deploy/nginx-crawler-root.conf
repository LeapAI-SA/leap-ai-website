# GEO crawler files at domain root for AI validators
# Site runs at /leap-ai — validators check /llms.txt (no prefix).
#
# Add inside your server { } block for leapai-webhook.bab.solutions
# Replace 127.0.0.1:3000 with your Next.js upstream if different.
#
# Option A (recommended): proxy — validator gets HTTP 200 at root URL
location = /llms.txt {
  proxy_pass http://127.0.0.1:3000/leap-ai/llms.txt;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
}
location = /llms-full.txt {
  proxy_pass http://127.0.0.1:3000/leap-ai/llms-full.txt;
  proxy_set_header Host $host;
}
location = /llms-small.txt {
  proxy_pass http://127.0.0.1:3000/leap-ai/llms-small.txt;
  proxy_set_header Host $host;
}
location = /robots.txt {
  proxy_pass http://127.0.0.1:3000/leap-ai/robots.txt;
  proxy_set_header Host $host;
}
location = /sitemap.xml {
  proxy_pass http://127.0.0.1:3000/leap-ai/sitemap.xml;
  proxy_set_header Host $host;
}
location = /.well-known/ai.txt {
  proxy_pass http://127.0.0.1:3000/leap-ai/.well-known/ai.txt;
  proxy_set_header Host $host;
}

# Option B (alternative): redirect — use if proxy_pass is not available
# location = /llms.txt { return 308 /leap-ai/llms.txt; }
# location = /llms-full.txt { return 308 /leap-ai/llms-full.txt; }
