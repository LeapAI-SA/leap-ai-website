# Optional nginx rules when the Next.js app is mounted at /leap-ai
# but AI validators check the domain root (e.g. /llms.txt without /leap-ai).
#
# Add inside your server { } block for leapai-webhook.bab.solutions

location = /llms.txt { return 308 /leap-ai/llms.txt; }
location = /llms-full.txt { return 308 /leap-ai/llms-full.txt; }
location = /llms-small.txt { return 308 /leap-ai/llms-small.txt; }
location = /robots.txt { return 308 /leap-ai/robots.txt; }
location = /sitemap.xml { return 308 /leap-ai/sitemap.xml; }
location = /.well-known/ai.txt { return 308 /leap-ai/.well-known/ai.txt; }
