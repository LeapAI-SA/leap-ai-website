services:
  mongodb:
    image: mongo:7
    container_name: leap-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: leap
      MONGO_INITDB_ROOT_PASSWORD: leapsecret
      MONGO_INITDB_DATABASE: leapai
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # mongosh can crash on Docker Desktop (V8); TCP check is reliable here
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/27017'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: leap-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: leap-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://leap:leapsecret@mongodb:27017/leapai?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@leapai.ai}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SEED_ON_START: ${SEED_ON_START:-true}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /backend
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
        API_URL: http://backend:4000
    container_name: leap-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: /backend
      API_URL: http://backend:4000
      INTERNAL_API_URL: http://backend:4000
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
  uploads_data:
